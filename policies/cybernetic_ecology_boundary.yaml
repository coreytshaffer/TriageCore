rules:
  - id: tribal_sovereignty_and_confidentiality
    description: Require high-risk review for tribal sovereignty, sacred/burial grounds, or confidential infrastructure.
    trigger:
      terms:
        - tribal
        - bo-no-po-ti
        - bloody island
        - sacred
        - archaeological
        - burial
        - cultural resource
        - confidential infrastructure
    decision: human_only
    message: Tribal sovereignty, historical context, or confidential infrastructure requires human approval.

  - id: public_health_and_safety
    description: Flag public health or water safety claims.
    trigger:
      terms:
        - water intake
        - sewer lift
        - unsafe
        - toxic
        - cyanobacteria bloom
        - do not swim
        - contamination
    decision: codex
    message: Public health or water safety statements require official verification.

  - id: regulatory_interpretation
    description: Check for compliance or violation claims.
    trigger:
      terms:
        - violates regulation
        - out of compliance
        - illegal discharge
        - violation
    decision: codex
    message: Definitive compliance or violation claims must be routed through Codex.

  - id: sensitive_coordinates
    description: Escalate precise GPS coordinate details to human review.
    trigger:
      regex:
        - '\d{1,3}°\d{1,2}''\d{1,2}"\s*[NS]'
        - '\d{1,3}°\d{1,2}''\d{1,2}"\s*[EW]'
    decision: human_only
    message: GPS coordinate exposures require manual human verification.
