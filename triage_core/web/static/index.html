<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TriageCore Mobile</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <header class="app-header">
        <h1>TriageCore</h1>
        <div class="tabs">
            <button class="tab-btn active" data-tab="ledger">Ledger</button>
            <button class="tab-btn" data-tab="logs">Logs</button>
        </div>
    </header>

    <main class="app-content">
        <!-- LEDGER TAB -->
        <section id="ledger-tab" class="tab-pane active">
            <div id="task-list" class="task-list">
                <div class="loading">Loading tasks...</div>
            </div>
        </section>

        <!-- LOGS TAB -->
        <section id="logs-tab" class="tab-pane">
            <div id="log-console" class="log-console">
                <div class="loading">Loading logs...</div>
            </div>
            <button id="refresh-logs" class="btn primary">Refresh Logs</button>
        </section>
    </main>

    <!-- REVIEW MODAL -->
    <div id="review-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Review Task</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <h3 id="modal-task-title"></h3>
                <p id="modal-task-desc"></p>
                <div class="modal-meta">
                    <span id="modal-task-runner" class="badge"></span>
                    <span id="modal-task-status" class="badge"></span>
                </div>
                
                <div class="review-controls">
                    <label>Workload:</label>
                    <select id="review-workload">
                        <option value="not_recorded">Not Recorded</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-reject" class="btn danger">Reject</button>
                <button id="btn-accept" class="btn success">Accept</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
