<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TriageCore Mobile</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header class="app-header">
        <h1>TriageCore</h1>
        <p id="connection-status" class="connection-status">Not connected</p>
    </header>

    <main class="app-content">
        <section id="auth-panel" class="auth-panel">
            <h2>Connect to local review</h2>
            <p>Enter the bearer token configured on the TriageCore host.</p>
            <form id="auth-form">
                <label for="mobile-token">Mobile token</label>
                <input
                    id="mobile-token"
                    name="mobile-token"
                    type="password"
                    autocomplete="current-password"
                    required
                >
                <button type="submit" class="btn primary">Connect</button>
            </form>
            <p id="auth-error" class="error-message" role="alert"></p>
        </section>

        <section id="ledger-panel" class="hidden">
            <div id="task-list" class="task-list">
                <div class="loading">Connect to load tasks.</div>
            </div>
        </section>
    </main>

    <div id="review-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Review Task</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <div class="modal-body">
                <h3 id="modal-task-title"></h3>
                <div class="modal-meta">
                    <span id="modal-task-runner" class="badge"></span>
                    <span id="modal-task-status" class="badge"></span>
                </div>
                
                <div class="review-controls">
                    <label>Workload:</label>
                    <select id="review-workload">
                        <option value="not_recorded">Not Recorded</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-reject" class="btn danger">Reject</button>
                <button id="btn-accept" class="btn success">Accept</button>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
